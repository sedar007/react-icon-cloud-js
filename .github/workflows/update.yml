name: Update and Publish

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Type de version (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org/

      - name: Change Version
        id: change_version
        run: |
          current_version=$(jq -r '.version' package.json)

          IFS='.' read -r -a version_parts <<< "$current_version"

          major="${version_parts[0]}"
          minor="${version_parts[1]}"
          patch="${version_parts[2]}"

          case "${{ github.event.inputs.commit_message }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Version invalide"
              exit 1
              ;;
          esac

          new_version="$major.$minor.$patch"

          jq --arg new_version "$new_version" \
            '.version = $new_version' \
            package.json > tmp.json

          mv tmp.json package.json

          echo "new_version=$new_version" >> $GITHUB_ENV


      - name: Get Version
        run: |
          new_version=$(jq -r '.version' package.json)
          echo "new_version=$new_version" >> $GITHUB_ENV


      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"


      - name: Commit New Version
        run: |
          git add package.json
          git commit -m "chore: release v${{ env.new_version }}"


      - name: Push changes
        run: |
          git push origin main


      - name: Create Git Tag
        run: |
          git tag -a "v${{ env.new_version }}" -m "Release v${{ env.new_version }}"
          git push origin "v${{ env.new_version }}"


      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: "v${{ env.new_version }}"
          name: "v${{ env.new_version }}"
          draft: false
          prerelease: false


      - name: Install dependencies
        run: npm install


      - name: Build project
        run: npm run build


      - name: Create Archive of Build
        run: |
          zip -r "dist-${{ env.new_version }}.zip" dist


      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: "v${{ env.new_version }}"
          files: "dist-${{ env.new_version }}.zip"


      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
